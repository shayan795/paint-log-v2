<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>退会完了 — 塗装レシピ録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<!-- 認証は一切読み込まない（自動再ログインが起きないページ） -->
<style>
  :root{ --paper:#FAFAF7; --ink:#1E2430; --sub:#67707F; --accent:#D8442E; --line:#C9CFD9 }
  *{box-sizing:border-box}
  body{margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:"Zen Kaku Gothic New",-apple-system,"Hiragino Sans",sans-serif; line-height:1.7;
    display:flex; align-items:center; justify-content:center; padding:24px}
  .card{max-width:420px; text-align:center}
  .logo{font-weight:700; letter-spacing:.06em; display:inline-flex; align-items:center; gap:8px; font-size:1.05rem; margin-bottom:24px}
  .logo::before{content:""; width:10px; height:10px; border-radius:50%; background:var(--accent)}
  h1{font-size:1.4rem; margin:0 0 12px}
  p{font-size:.92rem; color:var(--sub); margin:0 0 8px}
  a.top{display:inline-block; margin-top:26px; padding:12px 28px; border-radius:24px;
    background:var(--ink); color:#fff; text-decoration:none; font-weight:700; font-size:.9rem}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">塗装レシピ録</div>
    <h1>退会が完了しました</h1>
    <p>アカウントと、あなたの投稿・プロフィールなどのデータはすべて削除されました。</p>
    <p>ご利用いただき、ありがとうございました。</p>
    <a class="top" href="index.html">トップへ戻る</a>
  </div>
</body>
</html>
