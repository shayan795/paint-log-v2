/* ============================================================================
   塗装レシピ録 v2 — デザインシステム + アプリシェル（1ファイル完結）
   ※ どんな開き方(ファイル直開き/サーバー)でも同じ表示になるよう、CSSはここに内蔵。
   ============================================================================ */
:root{
  --paper:#FAFAF7; --ink:#1E2430; --sub:#67707F; --line:#C9CFD9; --line-d:#9AA3B2;
  --bp:#2B4C9B; --bp-bg:#EDF1F9; --accent:#E01E28; --warn:#C8322A;
  --card:#fff;
  --surface:#FFFFFF; --surface-2:#FFFCF7; --bg-app:#E7E7E2;
  --topbar-h:52px; --bottomnav-h:52px; --maxw:480px;
}
/* ============ DARKMODE:START ============ */
[data-theme="dark"]{
  --paper:#15181E;
  --ink:#E8EAEE;
  --sub:#9CA9B6;
  --line:#2C313B;
  --line-d:#3E4654;
  --bp:#7B95CC;
  --bp-bg:#1F2738;
  --warn:#FF6B5F;
  --card:#1E2128;
  --surface:#1E2128;
  --surface-2:#232730;
  --bg-app:#0E1014;
}
[data-theme="dark"] body{background:var(--bg-app)}
[data-theme="dark"] .app{box-shadow:0 0 0 1px var(--line)}
[data-theme="dark"] .topbar{background:rgba(21,24,30,.93)}
[data-theme="dark"] .searchbox,
[data-theme="dark"] .note-box,
[data-theme="dark"] .drawer-btn,
[data-theme="dark"] .onb-card,
[data-theme="dark"] .auth-card,
[data-theme="dark"] .auth-g,
[data-theme="dark"] .pf-uploadbtn,
[data-theme="dark"] .pf-edit,
[data-theme="dark"] .pf-tab,
[data-theme="dark"] .tag-back,
[data-theme="dark"] .rep-btn,
[data-theme="dark"] .pf-field,
[data-theme="dark"] .set-item,
[data-theme="dark"] input,
[data-theme="dark"] textarea,
[data-theme="dark"] select{background:var(--surface);color:var(--ink);border-color:var(--line)}
[data-theme="dark"] input::placeholder,
[data-theme="dark"] textarea::placeholder{color:#5E6A78}
[data-theme="dark"] .notif-row:hover{background:var(--surface-2)}
[data-theme="dark"] .fullview-body iframe{background:var(--surface)}
[data-theme="dark"] .pf-tab.on{background:var(--surface);border-color:var(--ink);color:var(--ink)}
/* 全画面ビュー（通知・プロフィール他） */
[data-theme="dark"] .fullview{background:var(--paper)}
[data-theme="dark"] .fullview-bar{background:rgba(21,24,30,.93);border-bottom-color:var(--line)}
[data-theme="dark"] .fv-back{background:var(--surface);color:var(--ink);border-color:var(--line)}
[data-theme="dark"] .fv-title{color:var(--ink)}
/* 下タブ（モバイル）— 透過の黒系に */
[data-theme="dark"] .bottomnav{background:rgba(14,16,20,.78);border-top-color:rgba(255,255,255,.06)}
[data-theme="dark"] .bottomnav.scrolled{box-shadow:0 -1px 10px rgba(0,0,0,.55)}
[data-theme="dark"] .plus-circle{background:var(--accent);box-shadow:0 3px 9px rgba(0,0,0,.55)}
/* ベル＆アバター（トップバー右上） */
[data-theme="dark"] .bell-btn{background:var(--surface);color:var(--sub);border-color:var(--line)}
[data-theme="dark"] .bell-badge{border-color:var(--paper)}
[data-theme="dark"] .avatar-btn{background:var(--bp-bg);color:#E6ECFA;border-color:var(--line)}
/* テーマトグル */
.set-theme{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--surface)}
.set-theme-btn{padding:6px 12px;font:inherit;font-size:.8rem;background:transparent;border:none;color:var(--sub);cursor:pointer;border-left:1px solid var(--line)}
.set-theme-btn:first-child{border-left:none}
.set-theme-btn.on{background:var(--accent);color:#fff;font-weight:700}
[data-theme="dark"] .set-theme{background:var(--surface);border-color:var(--line)}
[data-theme="dark"] .set-theme-btn{color:var(--sub);border-left-color:var(--line)}
[data-theme="dark"] .set-theme-btn.on{background:var(--accent);color:#fff}
/* PCサイドバー（大画面時 — ベースCSSが900px境界） */
@media(min-width:900px){
  [data-theme="dark"] body{background:var(--bg-app)}
  [data-theme="dark"] .app{background:var(--paper)}
  [data-theme="dark"] .sidebar{background:var(--paper);border-right-color:var(--line)}
  [data-theme="dark"] .sb-search{background:var(--surface-2);border-color:var(--line)}
  [data-theme="dark"] .sb-item{color:var(--sub)}
  [data-theme="dark"] .sb-item:hover{background:var(--surface-2);color:var(--ink)}
  [data-theme="dark"] .sb-item.active{background:var(--surface-2);color:var(--ink)}
  [data-theme="dark"] .sb-account{color:var(--ink)}
  [data-theme="dark"] .sb-account:hover{background:var(--surface-2)}
  [data-theme="dark"] .sb-av{background:var(--bp-bg);color:#E6ECFA;border-color:var(--line)}
  [data-theme="dark"] .sb-logo{color:var(--ink)}
}
/* ============ DARKMODE:END ============ */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Zen Kaku Gothic New",-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#E7E7E2; color:var(--ink); line-height:1.65; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit}

/* アプリ列 */
.app{position:relative; max-width:var(--maxw); margin:0 auto; background:var(--paper); min-height:100vh; box-shadow:0 0 0 1px var(--line)}

/* 上バー */
.topbar{
  position:fixed; top:0; left:50%; transform:translateX(-50%); width:min(var(--maxw),100%);
  height:var(--topbar-h); background:rgba(250,250,247,.93); backdrop-filter:saturate(1.3) blur(8px);
  display:flex; align-items:center; gap:11px; padding:0 12px; z-index:40;
  transition:box-shadow .2s;
}
.topbar.scrolled{box-shadow:0 2px 10px rgba(20,24,32,.06)}
.avatar-btn{
  width:34px; height:34px; border-radius:50%; border:1px solid var(--line-d); background:var(--bp-bg);
  color:var(--bp); font-weight:700; font-size:.95rem; display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex:none; padding:0; overflow:hidden;
}
/* アバター画像（url優先）を円に収める共通ルール */
.avatar-btn img, .drawer-head .av img, .sb-av img{width:100%; height:100%; object-fit:cover; display:block}
.drawer-head .av, .sb-av{overflow:hidden}
.brand{display:inline-flex; align-items:center; gap:10px; line-height:1}
.brand .name{font-size:1rem; font-weight:700; letter-spacing:.05em; display:flex; align-items:center; gap:7px}
.brand .name::before{content:""; width:10px; height:10px; border-radius:50%; background:var(--accent); flex:none}
.brand .tag{font-size:.55rem; letter-spacing:.3em; color:var(--sub); text-transform:uppercase; margin-left:17px}
.brand-logo{display:block; object-fit:contain}
.brand-mark{height:40px; width:auto}
.brand-word{height:62px; width:auto; margin-top:6px}
/* テキスト版のワードマーク（モバイル） */
/* BRANDPOLISH:START — 戻すときはこのブロック内の追記分を削除 */
.brand-textword{display:flex;flex-direction:column;align-items:center;line-height:1.05;color:#BE2A33;text-align:center}
.brand-textword .b-title{font-size:1.4rem;font-weight:800;letter-spacing:.1em;text-shadow:0 1px 0 rgba(0,0,0,.04)}
.brand-textword .b-sub{font-size:.7rem;letter-spacing:.22em;margin-top:6px;font-weight:700;display:flex;align-items:center;gap:8px;opacity:.85}
.brand-textword .b-sub::before,
.brand-textword .b-sub::after{content:"";width:16px;height:1px;background:currentColor;opacity:.55;flex:none}
[data-theme="dark"] .brand-textword{color:#BE2A33}
[data-theme="dark"] .brand-textword .b-title{text-shadow:0 1px 0 rgba(0,0,0,.4)}
/* BRANDPOLISH:END */
[data-theme="dark"] .brand-logo{filter:brightness(1.5) saturate(1.35) contrast(1.05)}
/* スマホ：上部「塗装レシピ録」を中央に（アバター左・ベル右はそのまま） */
@media(max-width:899px){
  .topbar .brand{position:absolute; left:50%; transform:translateX(-50%); align-items:center; text-align:center}
  .topbar .brand .tag{margin-left:0}
}
.bell-btn{
  margin-left:auto; width:38px; height:38px; border-radius:50%; border:1px solid var(--line);
  background:#fff; color:var(--sub); display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex:none; padding:0;
}
.bell-btn svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.7}
.bell-btn{position:relative}
.bell-badge{position:absolute; top:-2px; right:-2px; background:var(--accent); color:#fff; font-size:.6rem; font-weight:700; line-height:1; min-width:16px; height:16px; padding:0 4px; border-radius:8px; display:flex; align-items:center; justify-content:center; border:2px solid var(--paper)}
/* PCサイドバーの「通知」タブ：バッジをベルアイコンの右上に重ねる（左上ロゴへ飛ぶのを防ぐ） */
#sbBell{position:relative}
#sbBell .bell-badge{top:6px; left:26px; right:auto}
/* 通知一覧 */
.notif-list{padding:6px 12px 24px}
.notif-row{display:flex; align-items:flex-start; gap:10px; width:100%; padding:14px 12px; border:none; border-bottom:1px solid var(--line); background:none; text-align:left; font:inherit; cursor:pointer}
.notif-row:hover{background:#FFFCF7}
.notif-row.unread .notif-title{font-weight:700; color:var(--ink)}
.notif-row .notif-title{font-weight:500; color:var(--sub); font-size:.92rem; line-height:1.4}
.notif-row .notif-body{font-size:.82rem; color:var(--sub); margin-top:3px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.notif-row .notif-main{flex:1; min-width:0}
.notif-row .notif-time{flex:none; font-size:.7rem; color:var(--line-d)}
.notif-dot{flex:none; width:8px; height:8px; border-radius:50%; background:transparent; margin-top:6px}
.notif-row.unread .notif-dot{background:var(--accent)}

/* PC左サイドバー（既定は非表示／PCのみ表示。スタイルはmin-width:900px内） */
.sidebar{display:none}

/* ビュー領域 */
.view{padding:calc(var(--topbar-h) + 16px) 14px calc(var(--bottomnav-h) + 30px)}
.view-title{font-size:1.2rem; margin:0 0 2px; letter-spacing:.03em}
.view-sub{font-size:.78rem; color:var(--sub); margin:0 0 18px}
.block{margin:0 0 24px}
.block > h3{font-size:.92rem; margin:0 0 10px; display:flex; align-items:center; gap:8px}
.block > h3::before{content:""; width:4px; height:14px; background:var(--accent); flex:none; border-radius:1px}

/* 検索欄 */
.searchbox{display:flex; align-items:center; gap:9px; border:1px solid var(--line); background:#fff; padding:11px 16px; margin-bottom:22px; margin-top:2px; border-radius:24px}
.searchbox svg{width:19px; height:19px; stroke:var(--sub); fill:none; stroke-width:1.8; flex:none}
.searchbox input{border:none; outline:none; font:inherit; width:100%; background:transparent; color:var(--ink)}

/* 仮メッセージ枠 */
.note-box{border:1px dashed var(--line-d); background:#fff; padding:16px; font-size:.83rem; color:var(--sub); border-radius:14px}
.note-box strong{color:var(--ink)}

/* おすすめカルーセル */
.card-row{display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch}
.card-row::-webkit-scrollbar{display:none}
.reco-card{flex:none; width:280px; cursor:pointer}
.reco-thumb{
  width:100%; aspect-ratio:4/3; border-radius:14px; overflow:hidden;
  background:repeating-linear-gradient(45deg,#EEF0F4,#EEF0F4 9px,#E5E9F0 9px,#E5E9F0 18px);
  display:flex; align-items:center; justify-content:center;
}
.reco-thumb img{width:100%; height:100%; object-fit:cover; display:block}
.reco-thumb .ph-ico{font-size:1.7rem; color:var(--line-d)}
.reco-title{font-size:.86rem; font-weight:700; margin-top:7px; line-height:1.35}
.reco-author{font-size:.72rem; color:var(--sub); margin-top:1px}
.dots{display:flex; gap:6px; justify-content:center; margin-top:12px}
.dot{width:7px; height:7px; border-radius:50%; background:var(--line); transition:background .2s, transform .2s}
.dot.on{background:var(--accent); transform:scale(1.25)}

/* 人気の塗装方法（画像メイン・左下ラベル・枠なし） */
.cat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
.cat-tile{
  position:relative; width:100%; aspect-ratio:4/3; border:none; padding:0; cursor:pointer;
  border-radius:14px; overflow:hidden; display:block;
  background:repeating-linear-gradient(45deg,#E9ECF2,#E9ECF2 9px,#DFE3EB 9px,#DFE3EB 18px);
}
.cat-tile img{width:100%; height:100%; object-fit:cover; display:block}
.cat-tile .cat-label{
  position:absolute; left:0; right:0; bottom:0; padding:22px 12px 10px; text-align:left;
  background:linear-gradient(to top, rgba(0,0,0,.6), rgba(0,0,0,0));
  color:#fff; font-weight:700; font-size:.9rem; line-height:1.25;
}
.cat-hidden{display:none}
.more-btn{display:block; margin:14px auto 0; background:none; border:1px solid var(--line); border-radius:20px; padding:8px 24px; font:inherit; font-size:.85rem; font-weight:700; color:var(--ink); cursor:pointer}
.more-btn:hover{border-color:var(--ink)}

/* 人気の塗料（よく使われる塗料を使った投稿を写真で引用） */
.paint-grid{display:flex; align-items:flex-start; gap:12px; overflow-x:auto; padding-bottom:4px}
.paint-grid::-webkit-scrollbar{display:none}
.paint-post{
  flex:none; width:150px; border:none; background:none; padding:0; text-align:left; cursor:pointer;
}
.pp-thumb{
  width:100%; aspect-ratio:1/1; border-radius:14px; overflow:hidden;
  background:repeating-linear-gradient(45deg,#EEF0F4,#EEF0F4 9px,#E5E9F0 9px,#E5E9F0 18px);
  display:flex; align-items:center; justify-content:center;
}
.pp-thumb img{width:100%; height:100%; object-fit:cover; display:block}
.pp-thumb .ph-ico{font-size:1.6rem; color:var(--line-d)}
.pp-cap{font-size:.82rem; font-weight:700; margin-top:7px; line-height:1.3}
.pp-sub{font-size:.7rem; color:var(--sub); margin-top:1px}
/* 塗料の色チップ表示：べた塗りではなく「光沢のある塗膜（濡れて光を反射）」に見せて手抜き感を消す。
   ・左上の白い反射＝ウェットな光沢  ・上明→下暗のグラデ＝塗膜のカーブ  ・内側のツヤ線＋下の影＝立体感 */
.pp-thumb.pp-color{
  background:
    radial-gradient(125% 85% at 24% 16%, rgba(255,255,255,.42), rgba(255,255,255,.06) 42%, rgba(255,255,255,0) 60%),
    linear-gradient(157deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,.20) 100%),
    var(--ppc,#cccccc);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.34), inset 0 -14px 30px rgba(0,0,0,.16);
}
/* 斜めの光のスジ（濡れた表面の反射）＝もう一段「塗ってある」感を足す */
.pp-thumb.pp-color::after{
  content:""; position:absolute; left:-30%; top:-40%; width:70%; height:150%;
  background:linear-gradient(105deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.16) 50%, rgba(255,255,255,0) 100%);
  transform:rotate(8deg); pointer-events:none;
}
.pp-thumb.pp-color .ph-ico{display:none}
.pp-thumb{position:relative}
/* 作例写真の上に塗料の色を小さく重ねる（どの塗料の作例か一目で分かる） */
.pp-swatch{position:absolute; left:8px; bottom:8px; width:22px; height:22px; border-radius:50%; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.3)}
.pp-uses{font-size:.66rem; color:var(--accent); font-weight:700; margin-top:2px}
/* 急上昇バッジ（作例写真の右上に小さく）＋「最近N件」 */
.pp-fire{position:absolute; right:8px; top:8px; background:var(--accent); color:#fff; font-size:.6rem; font-weight:800; padding:2px 7px; border-radius:999px; box-shadow:0 1px 4px rgba(0,0,0,.25); letter-spacing:.02em}
.pp-uses.pp-up{color:var(--accent)}
/* 順位（左上・どんな色の上でも読めるよう半透明の黒ピル）＝急上昇チャートの位置 */
.pp-rank{position:absolute; left:8px; top:8px; min-width:23px; height:23px; padding:0 6px; display:flex; align-items:center; justify-content:center; font-size:.92rem; font-weight:800; font-style:italic; color:#fff; background:rgba(0,0,0,.4); border-radius:8px; letter-spacing:.01em}
/* HEXコード（左下・色チップを「スペック付きスウォッチ」に見せる） */
.pp-hex{position:absolute; left:8px; bottom:8px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.62rem; font-weight:700; color:#fff; background:rgba(0,0,0,.34); padding:2px 7px; border-radius:6px; letter-spacing:.04em}

/* ===== 塗料ページ（塗料タップ → 作例＋購入リンク） ===== */
.paint-page{padding:20px 18px 40px}
.paint-hero{display:flex; gap:15px; align-items:center}
/* ヘッダーの光沢スウォッチ（チップと同じ塗膜表現） */
.paint-hero-sw{position:relative; flex:none; width:88px; height:88px; border-radius:18px; overflow:hidden;
  background:
    radial-gradient(125% 85% at 24% 16%, rgba(255,255,255,.42), rgba(255,255,255,.06) 42%, rgba(255,255,255,0) 60%),
    linear-gradient(157deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,.20) 100%),
    var(--ppc,#cccccc);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.34), inset 0 -10px 22px rgba(0,0,0,.16);
}
.paint-meta{min-width:0}
.paint-name{font-size:1.08rem; font-weight:800; line-height:1.25}
.paint-brand{font-size:.8rem; color:var(--sub); margin-top:3px}
.paint-buy{display:flex; gap:8px; margin-top:11px; flex-wrap:wrap}
.buy{display:inline-block; padding:8px 15px; border-radius:10px; font-size:.8rem; font-weight:800; text-decoration:none}
.buy.amazon{background:#ff9900; color:#1a1a1a}
.buy.rakuten{background:#bf0000; color:#fff}
.paint-note{font-size:.72rem; color:var(--sub); margin:14px 0 0; line-height:1.55}
.paint-works-h{font-size:.95rem; margin:24px 0 10px}

/* 下タブ */
.bottomnav{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:min(var(--maxw),100%);
  height:calc(var(--bottomnav-h) + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom);
  background:rgba(250,250,247,.68); -webkit-backdrop-filter:saturate(1.4) blur(12px); backdrop-filter:saturate(1.4) blur(12px);
  border-top:1px solid rgba(20,24,32,.06); display:flex; z-index:40; transition:box-shadow .2s;
}
.bottomnav.scrolled{box-shadow:0 -1px 10px rgba(20,24,32,.07)}
.nav-item{flex:1; border:none; background:none; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; color:var(--sub); font-size:.62rem; cursor:pointer; padding:5px 0}
.nav-item svg{width:20px; height:20px; stroke:var(--sub); fill:none; stroke-width:1.7}   /* 探す/記録アイコンは保存マークと同じグレーで統一 */
.nav-item.active{color:var(--ink)}
.nav-item.active svg{stroke:var(--sub)}
.bottomnav .nav-item > span:not(.plus-circle){display:none}   /* 下タブの文字（探す/作る/記録）は非表示・アイコンのみ */
.nav-plus{justify-content:flex-start; padding-top:4px}
.plus-circle{width:42px; height:42px; border-radius:50%; background:var(--sub); display:flex; align-items:center; justify-content:center; box-shadow:0 3px 9px rgba(20,24,32,.16)}
.plus-circle svg{width:23px; height:23px; stroke:#fff; fill:none; stroke-width:2.3}
.nav-plus .lbl{margin-top:2px}

/* ドロワー */
.scrim{position:fixed; inset:0; background:rgba(20,24,32,.45); opacity:0; pointer-events:none; transition:opacity .2s; z-index:50}
.toast{position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 22px; border-radius:24px; font-size:.86rem; font-weight:700; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:200; box-shadow:0 6px 20px rgba(20,24,32,.25)}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
@media(min-width:900px){ .toast{bottom:32px} }
.scrim.show{opacity:1; pointer-events:auto}
.drawer{
  position:fixed; top:0; left:0; width:min(312px,82%); height:100%; background:var(--paper);
  border-right:1px solid var(--line-d); z-index:60; transform:translateX(-100%); transition:transform .22s ease;
  display:flex; flex-direction:column; overflow-y:auto;
}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:24px 18px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px}
.drawer-head .av{width:48px; height:48px; border-radius:50%; background:var(--bp-bg); color:var(--bp); font-weight:700; font-size:1.1rem; display:flex; align-items:center; justify-content:center; border:1px solid var(--line-d); flex:none}
.drawer-head .who .n{font-weight:700}
.drawer-head .who .s{font-size:.74rem; color:var(--sub)}
.drawer-list{padding:6px 0; flex:1}
.drawer-list button{width:100%; text-align:left; background:none; border:none; padding:13px 18px; font:inherit; font-size:.92rem; color:var(--ink); cursor:pointer}
.drawer-list button:hover{background:var(--bp-bg)}
.drawer-list button.drawer-danger{color:var(--warn)}
.drawer-foot{padding:14px 18px; border-top:1px solid var(--line); font-size:.68rem; color:var(--sub); line-height:1.5}
/* ログイン/ログアウト */
.drawer-auth{padding:12px 18px; border-bottom:1px solid var(--line)}
.drawer-auth:empty{display:none}
.drawer-btn{width:100%; padding:11px; border-radius:8px; font:inherit; font-size:.9rem; font-weight:700; cursor:pointer; border:1px solid var(--line-d); background:#fff; color:var(--ink)}
.drawer-btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
.drawer-btn.danger{border-color:var(--warn); color:var(--warn)}
.drawer-auth .note{font-size:.74rem; color:var(--sub); margin:0}
/* メニュー最下部のログアウト・退会（プライバシーポリシーの下） */
.drawer-bottom{padding:8px 18px 4px; display:flex; flex-direction:column; gap:8px}
.drawer-bottom:empty{display:none}
/* 初回ニックネーム入力モーダル（必須・閉じられない） */
.onb-overlay{position:fixed; inset:0; background:rgba(20,26,40,.55); display:flex; align-items:center; justify-content:center; padding:22px; z-index:100}
.onb-overlay[hidden]{display:none}
.onb-card{background:#fff; border-radius:16px; padding:24px 22px; width:100%; max-width:360px; text-align:center}
.onb-card h2{font-size:1.2rem; margin:0 0 8px}
.onb-card p{font-size:.84rem; color:var(--sub); margin:0 0 16px; line-height:1.6}
.onb-card input{width:100%; padding:12px 14px; border:1px solid var(--line-d); border-radius:10px; font:inherit; font-size:1rem; color:var(--ink); margin-bottom:14px; text-align:center}
.onb-card input[type=text]:focus{outline:none; border-color:var(--accent)}
.onb-consent{display:flex; align-items:flex-start; gap:8px; text-align:left; font-size:.8rem; color:var(--sub); margin:0 0 14px; line-height:1.5}
.onb-consent input{width:auto; margin:3px 0 0}
.onb-consent a{color:var(--bp)}
.onb-label{display:block; text-align:left; font-size:.76rem; font-weight:700; color:var(--ink); margin:2px 0 4px}
.onb-hint{font-weight:400; color:var(--sub); font-size:.72rem}
.onb-err{text-align:left; color:var(--warn); font-size:.76rem; min-height:1.1em; margin:2px 0 10px}
.drawer-btn:disabled{opacity:.45; cursor:not-allowed}

/* 認証画面（ログイン/新規登録/再設定） */
.auth-overlay{position:fixed; inset:0; background:rgba(20,26,40,.5); display:flex; align-items:flex-start; justify-content:center; padding:40px 18px; z-index:100; overflow:auto}
.auth-overlay[hidden]{display:none}
.auth-card{position:relative; background:#fff; border-radius:16px; padding:26px 22px; width:100%; max-width:380px}
.auth-close{position:absolute; top:10px; right:12px; border:none; background:none; font-size:1.5rem; line-height:1; color:var(--sub); cursor:pointer}
.auth-card h2{font-size:1.3rem; margin:0 0 18px; text-align:center}
.auth-g{width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border:1px solid var(--line-d); border-radius:10px; background:#fff; font:inherit; font-weight:700; font-size:.92rem; cursor:pointer}
.auth-g:hover{background:var(--bp-bg)}
.auth-or{display:flex; align-items:center; gap:10px; color:var(--sub); font-size:.74rem; margin:16px 0}
.auth-or::before,.auth-or::after{content:""; flex:1; height:1px; background:var(--line)}
.auth-label{display:block; font-size:.76rem; font-weight:700; color:var(--ink); margin:12px 0 4px}
.auth-hint{font-weight:400; color:var(--sub); font-size:.72rem}
.auth-field{width:100%; padding:11px 13px; border:1px solid var(--line-d); border-radius:8px; font:inherit; font-size:.95rem; color:var(--ink)}
.auth-field:focus{outline:none; border-color:var(--accent)}
.auth-consent{display:flex; align-items:flex-start; gap:8px; font-size:.8rem; color:var(--sub); margin:14px 0 4px; line-height:1.5}
.auth-consent input{width:auto; margin-top:3px}
.auth-consent a{color:var(--bp)}
.auth-err{color:var(--warn); font-size:.78rem; min-height:1.1em; margin:8px 0 0}
.auth-submit{width:100%; margin-top:14px; padding:12px; border:none; border-radius:10px; background:var(--accent); color:#fff; font:inherit; font-weight:700; cursor:pointer}
.auth-submit:disabled{opacity:.45; cursor:not-allowed}
.auth-foot{text-align:center; font-size:.82rem; color:var(--sub); margin-top:16px}
.auth-link{background:none; border:none; color:var(--bp); font:inherit; font-size:.82rem; cursor:pointer; padding:0; text-decoration:underline}
/* プロフィール（X風） */
.pf{width:100%}   /* 画面いっぱい（PCも全幅） */
/* 画像トリミング（X風・ドラッグ移動＋拡大） */
.crop-ov{position:fixed; inset:0; background:rgba(10,12,18,.82); z-index:130; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:20px}
.crop-title{color:#fff; font-weight:700; font-size:.95rem}
.crop-stage{position:relative; overflow:hidden; background:#000; touch-action:none; cursor:grab; box-shadow:0 6px 30px rgba(0,0,0,.5); max-width:100%}
.crop-stage.grabbing{cursor:grabbing}
.crop-stage.round{border-radius:50%}
.crop-img{position:absolute; left:0; top:0; max-width:none; user-select:none; -webkit-user-drag:none; pointer-events:none}
.crop-hint{color:#fff; font-size:.78rem; opacity:.8}
.crop-zoom{width:min(300px,80%)}
.crop-row{display:flex; gap:12px; margin-top:4px}
.crop-btn{padding:10px 24px; border-radius:10px; font-weight:700; font-size:.9rem; border:none; cursor:pointer}
.crop-ok{background:#BE2A33; color:#fff}
.crop-cancel{background:#fff; color:#333}
.pf-header{width:100%; height:clamp(150px,26vw,260px); background:linear-gradient(120deg,#C9CFD9,#E7E7E2); background-size:cover; background-position:center}
.pf-avatar img{width:100%; height:100%; border-radius:50%; object-fit:cover}
/* 画像アップロード行（編集フォーム） */
.pf-imgrow{display:flex; align-items:center; gap:12px; margin-bottom:4px}
.pf-imgprev{flex:none; background:#EEF0F4 center/cover no-repeat; border:1px solid var(--line)}
.pf-imgprev-h{width:96px; height:54px; border-radius:8px}
.pf-imgprev-a{width:54px; height:54px; border-radius:50%}
.pf-uploadbtn{border:1px solid var(--line-d); border-radius:8px; padding:8px 14px; font-size:.84rem; font-weight:700; cursor:pointer; background:#fff}
.pf-uploadbtn:hover{border-color:var(--ink)}
.pf-imgstatus{font-size:.74rem; color:var(--sub)}
.pf-bar{display:flex; align-items:flex-end; justify-content:space-between; padding:0 16px; margin-top:-34px}
.pf-avatar{width:72px; height:72px; border-radius:50%; background:var(--bp-bg); color:var(--bp); border:3px solid #fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.7rem}
.pf-edit{border:1px solid var(--line-d); background:#fff; color:var(--ink); font:inherit; font-weight:700; font-size:.85rem; padding:7px 18px; border-radius:20px; cursor:pointer; margin-bottom:6px}
.pf-edit:hover{border-color:var(--ink)}
.pf-info{padding:10px 16px 4px}
.pf-name{font-size:1.25rem; font-weight:700}
.pf-handle{font-size:.85rem; color:var(--sub); margin-top:1px}
.pf-bio{font-size:.9rem; margin-top:10px; line-height:1.6; white-space:pre-wrap}
.pf-link{display:inline-block; margin-top:8px; color:var(--bp); font-size:.88rem; text-decoration:none; word-break:break-all}
.pf-link:hover{text-decoration:underline}
/* プロフィールのXボタン（投稿ページの𝕏リンクと同じ見た目で、プロフィールからXへ飛べる） */
.pf-x{display:inline-flex; align-items:center; gap:6px; margin-top:8px; padding:6px 14px; border:1px solid var(--line-d); border-radius:999px; font-size:.85rem; font-weight:700; color:var(--ink); text-decoration:none; background:var(--surface,#fff)}
.pf-x:hover{border-color:var(--ink)}
.pf-x .x-badge{font-weight:900; font-size:1rem}
.pf-postsec{padding:18px 16px 8px}
.pf-postsec > h3{font-size:.95rem; margin:0 0 12px; display:flex; align-items:center; gap:8px}
.pf-postsec > h3::before{content:""; width:4px; height:14px; background:var(--accent); border-radius:1px}
#pfPosts,#recordsList,.tag-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px}
.rec-private{display:inline-block; margin-left:6px; font-size:.62rem; font-weight:700; color:var(--sub); border:1px solid var(--line-d); border-radius:6px; padding:0 5px; vertical-align:middle}
.rec-sec{margin-bottom:24px}
.rec-h{font-size:.95rem; margin:0 0 12px; display:flex; align-items:center; gap:8px}
.rec-h::before{content:""; width:4px; height:14px; background:var(--accent); border-radius:1px}
.pf-tabs{display:flex; gap:8px; margin-bottom:12px}
.pf-tab{border:1px solid var(--line); background:#fff; border-radius:18px; padding:5px 16px; font:inherit; font-size:.82rem; font-weight:700; color:var(--sub); cursor:pointer}
.pf-tab.on{background:#fff; border-color:var(--ink); color:var(--ink)}
.tag-back{font:inherit; font-size:.85rem; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); padding:6px 14px; cursor:pointer; margin-bottom:12px}
.tag-back:hover{border-color:var(--ink)}
#screen-tag .view-title{margin-bottom:14px}
.rep-card{border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; transition:opacity .15s}
.rep-card.rep-done{opacity:.55; background:var(--surface-2,#FFFCF7)}
.rep-card.rep-done .rep-reason::after{content:" ・対応済み"; color:var(--bp); font-size:.78rem; font-weight:700}
.rep-reason{font-weight:700; color:var(--warn)}
.rep-detail{font-size:.86rem; color:var(--ink); margin-top:4px; white-space:pre-wrap}
.rep-meta{font-size:.74rem; color:var(--sub); margin-top:6px}
.rep-act{display:flex; gap:8px; margin-top:10px}
.rep-btn{font:inherit; font-size:.82rem; font-weight:700; padding:7px 14px; border:1px solid var(--line-d); border-radius:8px; background:#fff; color:var(--ink); cursor:pointer}
.rep-btn.on{background:var(--bp-bg); border-color:var(--bp); color:var(--bp)}
.rep-btn.danger{color:var(--warn); border-color:var(--warn)}
.rep-btn.danger:hover{background:#FBEAE7}
.rep-btn:hover{border-color:var(--ink)}
.pf-empty{grid-column:1/-1; color:var(--sub); font-size:.84rem; margin:0}
.pf-post{border:none; background:none; padding:0; text-align:left; cursor:pointer}
.pf-post-thumb{position:relative; display:block; width:100%; aspect-ratio:1/1; border-radius:12px; overflow:hidden; background:repeating-linear-gradient(45deg,#EEF0F4,#EEF0F4 9px,#E5E9F0 9px,#E5E9F0 18px)}
.match-why{position:absolute; top:8px; left:8px; background:rgba(20,24,32,.78); color:#fff; padding:3px 8px; border-radius:10px; font-size:.66rem; font-weight:700; letter-spacing:.05em}
.pf-post-thumb img{width:100%; height:100%; object-fit:cover; display:block}
.pf-post-title{font-size:.82rem; font-weight:700; margin-top:6px; line-height:1.3; color:var(--accent)}
/* プロフィール編集フォーム */
.pf-edit-form{padding:20px 16px}
.pf-label{display:block; font-size:.78rem; color:var(--sub); margin:14px 0 4px}
.pf-field{width:100%; max-width:420px; padding:11px 13px; border:1px solid var(--line); border-radius:8px; font:inherit; font-size:.95rem; color:var(--ink); background:#fff}
.pf-field:focus{outline:none; border-color:var(--accent)}
textarea.pf-field{resize:vertical; line-height:1.6}

/* 全画面ビュー(legacy iframe / 空ページ) */
.fullview{
  position:fixed; top:0; bottom:0; left:50%; transform:translateX(-50%);
  width:min(var(--maxw),100%); background:var(--paper); z-index:80;
  display:flex; flex-direction:column;
}
.fullview[hidden]{display:none}
.fullview-bar{
  height:var(--topbar-h); flex:none; display:flex; align-items:center; gap:10px; padding:0 10px;
  border-bottom:1px solid var(--line); background:rgba(250,250,247,.96);
}
.fv-back{
  border:1px solid var(--line); background:#fff; color:var(--ink); font:inherit; font-size:.85rem;
  padding:7px 12px; border-radius:6px; cursor:pointer; white-space:nowrap; flex:none;
}
.fv-title{font-size:.92rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0}
.fullview-body{flex:1; overflow:auto; position:relative}
.fullview-body iframe{position:absolute; inset:0; width:100%; height:100%; border:0; background:#fff}

/* 空ページ */
.stub{padding:32px 22px}
.stub h2{font-size:1.15rem; margin:0 0 8px}
.stub p{font-size:.86rem; color:var(--sub); margin:0}
/* 設定ページ */
.set-sec{border:1px solid var(--line); border-radius:12px; padding:6px 14px; margin:14px 0}
.set-k{font-size:.72rem; font-weight:700; color:var(--sub); padding:8px 0 4px}
.set-row{display:flex; justify-content:space-between; gap:12px; padding:10px 0; border-top:1px solid var(--line); font-size:.86rem; align-items:center; flex-wrap:wrap}
.set-row > span:first-child{color:var(--sub); flex:none}
.set-row > span:last-child{text-align:right; display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end}
.set-link{background:none; border:none; color:var(--accent); font:inherit; font-size:.82rem; font-weight:700; cursor:pointer; padding:0; text-decoration:underline}
.set-link:hover{color:#b83322}
.set-muted{color:var(--sub); font-size:.78rem}
.set-help{font-size:.74rem; color:var(--sub); margin:8px 0 6px}
.set-item{display:block; width:100%; text-align:left; background:#fff; border:1px solid var(--line); border-radius:10px; padding:13px 15px; margin-top:8px; font:inherit; font-size:.9rem; font-weight:700; color:var(--ink); cursor:pointer; text-decoration:none}
.set-item:hover{border-color:var(--ink)}
.set-item.danger{color:var(--warn); border-color:var(--warn)}
.set-ver{font-size:.78rem; color:var(--sub); margin:18px 0 0}

/* ============================================================================
   PC（デスクトップ）レイアウト — クックパッドPC風。横長ヘッダー＋多段カラム。
   下タブは非表示にし、ナビと検索をヘッダーへ。コンテンツを横に広げる。
   ============================================================================ */
@media (min-width:900px){
  body{background:#fff}
  .app{max-width:none; background:#fff; box-shadow:none}

  /* モバイル用の上バー・下タブ・本文内検索は隠す */
  .topbar{display:none}
  .bottomnav{display:none}
  #screen-discover > .searchbox{display:none}

  /* 左サイドバー（クックパッドPC風） */
  .sidebar{
    display:flex; flex-direction:column; gap:5px;
    position:fixed; top:0; left:0; bottom:0; width:232px; padding:18px 14px;
    background:#fff; border-right:1px solid var(--line); z-index:40;
  }
  .sb-logo{display:flex; align-items:center; justify-content:center; padding:4px 8px 14px 28px}
  .sb-logo .dot{display:none}
  .sb-logo-img{height:120px; width:auto; max-width:100%; display:block; object-fit:contain}
  [data-theme="dark"] .sb-logo-img{filter:brightness(1.5) saturate(1.35) contrast(1.05)}
  .sb-search{display:flex; align-items:center; gap:8px; background:#F1F1ED; border:1px solid var(--line); border-radius:22px; padding:9px 14px; margin-bottom:10px}
  .sb-search svg{width:17px; height:17px; stroke:var(--sub); fill:none; stroke-width:1.8; flex:none}
  .sb-search input{border:none; outline:none; background:transparent; font:inherit; width:100%; color:var(--ink)}
  .sb-nav{display:flex; flex-direction:column; gap:4px}
  .sb-item{display:flex; align-items:center; gap:12px; border:none; background:none; font:inherit; font-size:.95rem; font-weight:700; color:var(--sub); padding:11px 12px; border-radius:10px; cursor:pointer; text-align:left; text-decoration:none}
  .sb-item svg{width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.8; flex:none}
  .sb-item:hover{background:var(--bp-bg); color:var(--ink)}
  .sb-item.active{color:var(--ink); background:var(--bp-bg)}
  .sb-item.active svg{stroke:var(--accent)}
  .sb-create{color:#fff; background:var(--accent)}
  .sb-create:hover{color:#fff; background:#c23c2a}
  .sb-create svg{stroke:#fff}
  .sb-account{margin-top:auto; display:flex; align-items:center; gap:10px; border:none; background:none; font:inherit; font-weight:700; color:var(--ink); padding:10px 12px; border-radius:10px; cursor:pointer}
  .sb-account:hover{background:var(--bp-bg)}
  .sb-av{width:30px; height:30px; border-radius:50%; background:var(--bp-bg); color:var(--bp); border:1px solid var(--line-d); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; flex:none}

  /* コンテンツはサイドバー分ずらして全幅。グリッドは幅に応じ列数自動増加 */
  .view{max-width:none; margin-left:232px; padding:30px 36px 72px}
  .block{margin-bottom:36px}
  .block > h3{font-size:1.05rem; margin-bottom:16px}
  .reco-card{width:320px}
  .cat-grid{grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:20px}
  .paint-post{width:200px}

  /* 全画面ビュー（準備中スタブ）もサイドバー分ずらす */
  .fullview{width:auto; left:232px; right:0; transform:none}
  .fullview-bar{padding:0 30px}
}

[hidden]{display:none !important}
</style>
</head>
<body>
<div class="app">

  <!-- 左サイドバー（PCのみ表示。クックパッドPC風） -->
  <aside class="sidebar">
    <div class="sb-logo"><img class="sb-logo-img" src="assets/logo-full.png" alt="塗装レシピ録 / Plamo-Paint"></div>

      <button class="sb-item" data-tab="discover">

        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>作る</span>
      </button>
      <button class="sb-item" data-tab="records">
        <svg viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 011 1v17l-7-4-7 4V4a1 1 0 011-1z"/></svg><span>記録</span>

      <button class="sb-item" id="sbBell">
        <svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg><span>通知</span>
      </button>
    </nav>
    <button class="sb-account" id="sbAccount"><span class="sb-av">K</span><span>ゲスト</span></button>

  <!-- 上バー（モバイルのみ） -->
  <header class="topbar">
    <button class="avatar-btn" id="avatarBtn" aria-label="メニュー">K</button>

      <div class="brand-textword">
        <div class="b-title">塗装レシピ録</div>
        <div class="b-sub">Plamo-Paint</div>

    </div>
    <button class="bell-btn" id="bellBtn" aria-label="通知">
      <svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg>
    </button>

  <!-- 探す（起動時デフォルト） -->
  <main class="view" id="screen-discover">
    <div class="searchbox">
      <svg id="searchIcon" viewBox="0 0 24 24" style="cursor:pointer"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="search" id="searchInput" placeholder="作品・塗料・塗装方法を探す" enterkeyhint="search">
    </div>
    <section class="block">
      <h3>おすすめ</h3>
      <div class="card-row" id="recoRow"></div>
      <div class="dots" id="recoDots"></div>
    </section>
    <section class="block">
      <h3>人気の塗装方法</h3>
      <div class="cat-grid" id="catGrid"></div>
      <button class="more-btn" id="catMore" style="display:none">もっと見る</button>
    </section>
    <section class="block">
      <h3>今話題の塗料作例</h3>

    <section class="block">
      <h3>人気の塗料</h3>

    <section class="block" id="risingSec" style="display:none">

  </main>

  <!-- 記録 -->
  <main class="view" id="screen-records" hidden>
    <h2 class="view-title">記録</h2>
    <p class="view-sub">保存した投稿（自分の作品はプロフィールから）</p>
    <div id="recordsList"></div>
  </main>

  <!-- 塗装方法/タグの絞り込み結果（上バーはそのまま＝アバター/ロゴ/通知が見える） -->
  <main class="view" id="screen-tag" hidden>
    <button class="tag-back" id="tagBack">← 戻る</button>
    <h2 class="view-title" id="tagTitle"></h2>
    <section class="block" id="tagRecoSec" hidden>
      <h3>おすすめ</h3>
      <div class="card-row" id="tagRecoRow"></div>
      <div class="dots" id="tagRecoDots"></div>
    </section>
    <section class="block">
      <h3>新着</h3>

  </main>

  <!-- 下タブ -->
  <nav class="bottomnav">
    <button class="nav-item active" data-tab="discover">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>探す</span>
    </button>
    <button class="nav-item nav-plus" id="plusBtn" aria-label="レシピを作る">
      <span class="plus-circle"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span>
      <span class="lbl">作る</span>
    </button>
    <button class="nav-item" data-tab="records">
      <svg viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 011 1v17l-7-4-7 4V4a1 1 0 011-1z"/></svg>
      <span>記録</span>
    </button>
  </nav>

  <!-- ドロワー -->
  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div class="av">ゲ</div>
      <div class="who"><div class="n">ゲスト</div><div class="s">ログインしていません</div></div>
    </div>
    <div class="drawer-auth" id="drawerAuth"></div>
    <div class="drawer-list" id="drawerList"></div>
    <div class="drawer-bottom" id="drawerBottom"></div>
    <div class="drawer-foot">塗装レシピ録<br>記載の商品名は各社の商標です。当サイトはアフィリエイトリンクを含みます。</div>
  </aside>

  <!-- 初回ログイン: 表示名の必須入力（決めるまで閉じない） -->
  <div class="onb-overlay" id="onbOverlay" hidden>
    <div class="onb-card">
      <h2>ようこそ！</h2>
      <p>アカウントの初期設定です。<br>本名は使いません。</p>
      <label class="onb-label">ユーザーID<span class="onb-hint">（半角英数・_、後から変更できません）</span></label>
      <input id="onbUserId" type="text" placeholder="例：plamo_taro" maxlength="20" autocapitalize="off" autocomplete="off" autocorrect="off">
      <label class="onb-label">ニックネーム（表示名・後から変更可）</label>

      <div class="onb-err" id="onbErr"></div>

      <button class="drawer-btn primary" id="onbSave" disabled>これで始める</button>
    </div>

  <!-- 認証（ログイン / 新規登録 / パスワード再設定）。中身はJSで切替 -->

    <div class="auth-card">
      <button class="auth-close" id="authClose" aria-label="閉じる">×</button>

  <!-- 全画面ビュー（編集/閲覧/とは=legacy, 空ページ） -->

</div>

<!-- 認証ライブラリ＋接続設定（classic。HTTP配信時のみログイン動作。file://やオフラインでも閲覧は維持） -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="src/config.js"></script>
<script>
/* ============================================================================
   塗装レシピ録 v2 — アプリシェルのロジック（モジュール不使用＝どこでも動く）
   ログイン/DB無し。表示は下の MOCK 仮データのみ。差替えは MOCK だけ直せばよい。
   ============================================================================ */
"use strict";

/* 塗装方法マスター（単一の真実。legacy.html と同一内容を持つ） */
var PAINT_METHODS = [
  { slug:"grad",       label:"グラデーション塗装" },
  { slug:"candy",      label:"キャンディ塗装" },
  { slug:"candy_red",  label:"キャンディ塗装 レッド" },
  { slug:"candy_blue", label:"キャンディ塗装 ブルー" },
  { slug:"wrap",       label:"ラップ塗装" },
  { slug:"marble",     label:"大理石塗装" },
  { slug:"weather",    label:"ウェザリング" },
  { slug:"brush",      label:"筆塗り" },
  { slug:"metal",      label:"メタリック塗装" },
  { slug:"matte",      label:"つや消し仕上げ" },
  { slug:"mask",       label:"マスキング塗り分け" }
];
var METHOD_LABEL = {}; PAINT_METHODS.forEach(function(m){ METHOD_LABEL[m.slug] = m.label; });

/* ----------------------------- 仮データ(MOCK) ----------------------------- */
var MOCK = {
  // おすすめ（みんなの作品）。cardImg は将来「X共有用カード画像」に差し替える。
  recommendedWorks: [
    { id:"w1", title:"RX-78-2 ガンダム",        author:"Ku-xii",      cardImg:null },
    { id:"w2", title:"ザクII シャア専用",       author:"Ku-xii",      cardImg:null },
    { id:"w3", title:"サザビー キャンディ塗装", author:"ともだち作例", cardImg:null },
    { id:"w4", title:"ナイチンゲール",          author:"Ku-xii",      cardImg:null },
    { id:"w5", title:"ウイングガンダムゼロ",    author:"ともだち作例", cardImg:null },
    { id:"w6", title:"百式 ゴールド仕上げ",     author:"Ku-xii",      cardImg:null }
  ],
  // 人気の塗装方法（カテゴリ）。メインは画像。img は後で代表作の写真URLに差し替える。
  popularCategories: [
    { id:"c_grad",    label:"グラデーション塗装",       img:null },
    { id:"c_candy_r", label:"キャンディ塗装 レッド編", img:null },
    { id:"c_candy_b", label:"キャンディ塗装 ブルー編", img:null },
    { id:"c_wrap",    label:"ラップ塗装",               img:null },
    { id:"c_marble",  label:"大理石塗装",               img:null },
    { id:"c_weather", label:"ウェザリング",             img:null },
    { id:"c_brush",   label:"筆塗り塗装",               img:null },
    { id:"c_metal",   label:"メタリック塗装",           img:null },
    { id:"c_matte",   label:"つや消し仕上げ",           img:null },
    { id:"c_mask",    label:"マスキング塗り分け",       img:null }
  ],
  // 今話題の塗料作例（画像タイル形式・人気の塗装方法と同じ見た目）
  trendingWorks: [
    { id:"t1", label:"ガイア Exシルバーの輝き",   img:null },
    { id:"t2", label:"GX クリアレッドキャンディ", img:null },
    { id:"t3", label:"ファレホ 筆塗り迷彩",       img:null },
    { id:"t4", label:"Mr.カラー 焼鉄色の表現",    img:null },
    { id:"t5", label:"ガンダムマーカー 部分塗装", img:null },
    { id:"t6", label:"つや消しトップコート作例",  img:null }
  ],
  // 人気の塗料：よく使われる塗料を集計し、それを使った投稿を写真で引用する。
  // img は後でその塗料を使った代表投稿の写真URLに差し替える。
  popularPaints: [
    { id:"pt_cdbb41608b8b", brand:"Mr.カラー",     code:"C3",   name:"レッド",         img:null },
    { id:"pt_xx_surfacer",  brand:"ガイアノーツ",  code:"",     name:"サーフェイサー", img:null },
    { id:"pt_c1b34f30d474", brand:"Mr.カラー",     code:"C5",   name:"ブルー",         img:null },
    { id:"pt_bc0ef62b3654", brand:"Mr.カラー",     code:"C8",   name:"シルバー",       img:null },
    { id:"pt_e2243770195b", brand:"Mr.カラー",     code:"C9",   name:"ゴールド",       img:null },
    { id:"pt_clear_red",    brand:"Mr.カラー",     code:"C47",  name:"クリアーレッド", img:null }
  ],
  // ドロワー項目。kind:"legacy"=legacy.htmlを開く / "stub"=空ページ枠。
  drawerItems: [
    { id:"profile",  label:"プロフィール",         kind:"stub" },
    { id:"about",    label:"塗装レシピ録とは",     kind:"legacy", hash:"#about" },
    { id:"course",   label:"初心者向け塗装講座",   kind:"page", url:"course.html" },
    { id:"settings", label:"設定",                 kind:"settings" },
    { id:"help",     label:"ヘルプ",               kind:"page", url:"help.html" },
    { id:"feedback", label:"お問い合わせ",         kind:"contact" },
    { id:"terms",    label:"利用規約",             kind:"page", url:"terms.html" },
    { id:"privacy",  label:"プライバシーポリシー", kind:"page", url:"privacy.html" }
  ]
};

var $ = function(id){ return document.getElementById(id); };
var esc = function(s){ return String(s).replace(/[&<>"]/g, function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); };
// URLサニタイズ：http(s)のみ許可し javascript:/data: 等のスキームをブロック（保存型XSS対策）。
// 無効なら空文字を返す（呼び出し側でリンク化せずプレーン表示する）。
var safeUrl = function(u){ u = String(u||"").trim(); return /^https?:\/\//i.test(u) ? u : ""; };

/* ----------------------------- 下タブ切替 ----------------------------- */
var screens = { discover: $("screen-discover"), records: $("screen-records") };
function showTab(tab, keepHash){
  if (!fullview.hidden) closeFull();        // プロフィールが開いていれば閉じてから遷移
  $("screen-tag").hidden = true;            // タグ結果画面も閉じる
  for (var key in screens) screens[key].hidden = (key !== tab);
  var items = document.querySelectorAll("[data-tab]");   // 下タブ＋PCヘッダーナビ両方
  for (var i=0;i<items.length;i++) items[i].classList.toggle("active", items[i].dataset.tab === tab);
  if (tab === "records") renderRecords();   // 記録タブ＝自分の投稿一覧
  if (!keepHash) setHash(tab === "records" ? "records" : "discover");   // リロード復元用
  window.scrollTo(0,0);
  if (typeof track === "function") track("page_view", { tab: tab });
}
// リロードで前の画面に戻れるよう、現在地を location.hash に保持（履歴は汚さない）
function setHash(h){ try{ history.replaceState(null, "", h ? "#"+h : location.pathname + location.search); }catch(_){ location.hash = h || ""; } }

// 投稿カード（記録/プロフィール共通）
function recordCard(r){
  var c = document.createElement("button"); c.className = "pf-post";
  var thumb = r.cover_url ? '<span class="pf-post-thumb"><img src="'+esc(r.cover_url)+'" alt=""></span>' : '<span class="pf-post-thumb"></span>';
  var badge = (r.is_public === false) ? '<span class="rec-private">非公開</span>' : '';
  c.innerHTML = thumb + '<div class="pf-post-title">'+esc(r.title||"無題")+badge+'</div>';
  c.addEventListener("click", function(){ location.href = "/r/" + r.id; });
  return c;
}
// 記録タブ：作成した投稿＋保存した投稿（クリップ）の2セクション
function renderRecords(){
  var box = $("recordsList"); if (!box) return;
  if (!sb || !currentUserId){
    box.innerHTML = '<div class="note-box">ログインすると、保存した投稿がここに並びます。左上のメニューからログインしてください。</div>';
    return;
  }
  box.innerHTML = '<p class="pf-empty">読み込み中…</p>';
  // 記録タブ＝保存(クリップ)した投稿だけ。自分の作成物はプロフィールで見る
  var SEL = "id,title,cover_url,is_public,created_at";
  sb.from("clips").select("recipe_id").eq("user_id", currentUserId).then(function(cl){
    if (cl && cl.error){ box.innerHTML = '<div class="note-box">読み込みに失敗しました。通信状況を確認して、引き下げて更新してください。</div>'; return; }
    var ids = (cl && cl.data) ? cl.data.map(function(x){ return x.recipe_id; }) : [];
    function paint(saved){
      if (!saved.length){ box.innerHTML = '<p class="pf-empty">保存した投稿はまだありません。気に入った作品の「保存」でここに集まります。</p>'; return; }
      box.innerHTML = ""; var g = document.createElement("div"); g.className = "tag-grid";
      saved.forEach(function(r){ g.appendChild(recordCard(r)); }); box.appendChild(g);
    }
    if (!ids.length){ paint([]); return; }
    sb.from("recipes").select(SEL).in("id", ids).order("created_at", { ascending:false }).then(function(sv){
      paint((sv && !sv.error && sv.data) ? sv.data : []);
    });
  });
}
(function(){
  var items = document.querySelectorAll("[data-tab]");
  for (var i=0;i<items.length;i++)(function(b){ b.addEventListener("click", function(){ showTab(b.dataset.tab); }); })(items[i]);
})();

/* ----------------------------- 全画面ビュー ----------------------------- */
var fullview = $("fullview"), fullviewBody = $("fullviewBody");
// 編集/閲覧/とは は legacy.html へ「全画面で普通に遷移」する。
// iframe埋め込みは iOS Safari や file:// で開けない（画面が出ない）不具合があるため使わない。
// クックパッドも編集は独立した1ページ。戻るは legacy.html 側の「← 戻る」で index.html へ。
function openLegacy(title, hash){
  window.location.href = "legacy.html" + hash;
}
function openStub(title, msg){
  $("fvTitle").textContent = title;
  fullviewBody.innerHTML = '<div class="stub"><h2>'+esc(title)+'</h2>'+
    '<p>'+esc(msg || "このページは現在ご利用いただけません。")+'</p></div>';
  fullview.hidden = false;
}
function closeFull(){ fullview.hidden = true; fullviewBody.innerHTML = ""; setHash($("screen-records").hidden ? "discover" : "records"); }
$("fvBack").addEventListener("click", closeFull);

/* ----------------------------- 塗料ページ ----------------------------- */
// アフィリエイトリンク（legacy.html と同じID・形式。塗料の購入リンクに付与）
var AMAZON_TAG = "plamopaint-22";
var RAKUTEN_ID = "5534da04.25b770df.5534da05.bfd723b3";
function amazonUrl(name){
  return "https://www.amazon.co.jp/s?k=" + encodeURIComponent(name) + (AMAZON_TAG ? "&tag=" + encodeURIComponent(AMAZON_TAG) : "");
}
function rakutenUrl(name){
  var search = "https://search.rakuten.co.jp/search/mall/" + encodeURIComponent(name) + "/";
  return RAKUTEN_ID
    ? "https://hb.afl.rakuten.co.jp/hgc/" + encodeURIComponent(RAKUTEN_ID) + "/?pc=" + encodeURIComponent(search)
    : search;
}
// その塗料を使った公開作例を集めて作品グリッドで出す
function loadPaintWorks(pid, box){
  if (!box) return;
  if (!sb || !pid){ box.innerHTML = '<p class="pf-empty">この塗料を使った公開作例はまだありません。</p>'; return; }
  var isFree = pid.indexOf("free:") === 0;
  var col = isFree ? "free_name" : "paint_id";
  var key = isFree ? pid.slice(5) : pid;
  sb.from("recipe_paints")
    .select("recipe_id, recipes:recipe_id(id,title,cover_url,is_public,view_count,created_at)")
    .eq(col, key).limit(120)
    .then(function(res){
      var rows = (res && !res.error && res.data) ? res.data : [];
      var seen = {}, works = [];
      rows.forEach(function(x){
        var r = x.recipes;
        if (!r || r.is_public !== true || !r.cover_url) return;   // 公開＋カバー有のみ
        if (seen[r.id]) return; seen[r.id] = 1;                    // 同じ作品の重複を除外
        works.push(r);
      });
      works.sort(function(a, b){ return (b.view_count||0) - (a.view_count||0); });
      works = works.slice(0, 18);
      if (!works.length){ box.innerHTML = '<p class="pf-empty">この塗料を使った公開作例はまだありません。</p>'; return; }
      box.innerHTML = ""; var g = document.createElement("div"); g.className = "tag-grid";
      works.forEach(function(r){ g.appendChild(recordCard(r)); }); box.appendChild(g);
    }, function(){ box.innerHTML = '<p class="pf-empty">読み込みに失敗しました。</p>'; });
}
// 塗料ページ本体：上に光沢スウォッチ＋名前＋購入リンク、下にその塗料を使った作例
function openPaint(opts){
  opts = opts || {};
  var name  = String(opts.label || "塗料");
  var brand = String(opts.brand || "");
  var hex   = opts.hex || "";
  var query = (brand ? brand + " " : "") + name;   // 購入の検索クエリ（ブランド＋名前）
  $("fvTitle").textContent = name;
  if (typeof track === "function") track("page_view", { tab:"paint", paint: query });
  var sw = hex
    ? '<span class="paint-hero-sw" style="--ppc:'+esc(hex)+'"><span class="pp-hex">'+esc(String(hex).toUpperCase())+'</span></span>'
    : '<span class="paint-hero-sw" style="background:repeating-linear-gradient(45deg,#EEF0F4,#EEF0F4 9px,#E5E9F0 9px,#E5E9F0 18px)"></span>';
  fullviewBody.innerHTML =
    '<div class="paint-page">'
    + '<div class="paint-hero">' + sw
    +   '<div class="paint-meta"><div class="paint-name">'+esc(name)+'</div>'
    +     (brand ? '<div class="paint-brand">'+esc(brand)+'</div>' : '')
    +     '<div class="paint-buy">'

function openSettings(){

    // パスワードがある場合は再認証して本人確認
    var preAuth = hasPassword
      ? sb.auth.signInWithPassword({ email: currentEmail, password: pw })
      : Promise.resolve({ data:{}, error:null });
    preAuth.then(function(pre){
      if (pre.error){ btn.disabled = false; err.textContent = "現在のパスワードが違います"; return; }

// パスワード変更ダイアログ
function openPasswordChange(currentEmail){
  if (!sb) return;
  closeDrawer();
  $("authOverlay").hidden = false;
  $("authBody").innerHTML =
    '<h2>パスワードを変更</h2>'
    + '<label class="auth-label">現在のパスワード</label>'
    + '<input id="pwOld" class="auth-field" type="password" autocomplete="current-password">'
    + '<label class="auth-label">新しいパスワード<span class="auth-hint">（6文字以上）</span></label>'
    + '<input id="pwNew" class="auth-field" type="password" autocomplete="new-password">'
    + '<label class="auth-label">新しいパスワード（確認）</label>'
    + '<input id="pwNew2" class="auth-field" type="password" autocomplete="new-password">'
    + '<div class="auth-err" id="pwErr"></div>'
    + '<button class="auth-submit" id="pwSubmit">変更する</button>'
    + '<div class="auth-foot"><button class="auth-link" id="pwCancel">キャンセル</button></div>';
  $("pwCancel").onclick = closeAuth;
  $("pwSubmit").onclick = function(){
    var oldPw = $("pwOld").value, newPw = $("pwNew").value, newPw2 = $("pwNew2").value;
    var err = $("pwErr"), btn = $("pwSubmit");
    if (!oldPw){ err.textContent = "現在のパスワードを入力してください"; return; }
    if (newPw.length < 6){ err.textContent = "新しいパスワードは6文字以上にしてください"; return; }
    if (newPw !== newPw2){ err.textContent = "新しいパスワードが一致しません"; return; }
    if (newPw === oldPw){ err.textContent = "新しいパスワードが現在と同じです"; return; }
    btn.disabled = true; err.textContent = "変更中…";
    sb.auth.signInWithPassword({ email: currentEmail, password: oldPw }).then(function(pre){
      if (pre.error){ btn.disabled = false; err.textContent = "現在のパスワードが違います"; return; }
      sb.auth.updateUser({ password: newPw }).then(function(res){
        if (res.error){ btn.disabled = false; err.textContent = "変更に失敗しました：" + res.error.message; if (typeof track==="function") track("settings_password_change_failed", { reason: res.error.message.slice(0,80) }); return; }
        // パスワードを実際に設定したので has_password=true を立てる（次回設定画面で「変更する」が出る）
        sb.from("profiles").update({ has_password: true }).eq("id", currentUserId).then(function(){});
        if (typeof track === "function") track("settings_password_changed", {});
        notifySelf("password_changed", "パスワードを変更しました", "心当たりがない場合はすぐにパスワード再設定してください。", "index.html#settings");
        closeAuth();
        if (typeof toast === "function") toast("パスワードを変更しました");
      });
    });
  };
}

function openTagResults(slug, label){
  if (!sb) return;
  if (!fullview.hidden){ fullview.hidden = true; fullviewBody.innerHTML = ""; }   // プロフィール等を閉じる
  $("screen-discover").hidden = true; $("screen-records").hidden = true; $("screen-tag").hidden = false;
  setHash("m/" + slug);
  if (typeof track === "function") track("page_view", { tab:"tag", slug: slug });
  $("tagTitle").textContent = label;
  var list = $("tagList"); list.innerHTML = '<p class="pf-empty">読み込み中…</p>';
  var recoSec = $("tagRecoSec"), recoRow = $("tagRecoRow"), recoDots = $("tagRecoDots");
  recoSec.hidden = true; recoRow.innerHTML = ""; recoDots.innerHTML = "";
  window.scrollTo(0,0);
  sb.from("recipes").select("id,title,cover_url,created_at,view_count,owner_id").eq("is_public", true)
    .contains("methods", [slug]).order("created_at", { ascending:false }).limit(50)
    .then(function(res){
      if (res && res.error){ list.innerHTML = '<p class="pf-empty">読み込みに失敗しました。</p>'; return; }
      var rows = res.data || [];
      if (!rows.length){ list.innerHTML = '<p class="pf-empty">この塗装方法の公開投稿はまだありません。</p>'; return; }
      // 上部おすすめ＝画像のある投稿を人気（トレンド）順で横スクロール（最大8件）
      var withCover = rows.filter(function(r){ return r.cover_url; }).sort(byTrending).slice(0, 8);
      if (withCover.length){
        recoSec.hidden = false;
        withCover.forEach(function(r, i){
          var card = document.createElement("div"); card.className = "reco-card";
          card.innerHTML = '<div class="reco-thumb"><img src="'+esc(r.cover_url)+'" alt=""></div>'
            + '<div class="reco-title">'+esc(r.title||"無題")+'</div>';
          card.addEventListener("click", function(){ location.href = "/r/" + r.id; });
          recoRow.appendChild(card);
          var dot = document.createElement("span"); dot.className = "dot" + (i === 0 ? " on" : ""); recoDots.appendChild(dot);
        });
        startCarousel(recoRow, recoDots);
      }
      // 下部＝新着順の全件
      list.innerHTML = "";
      rows.forEach(function(r){ list.appendChild(recordCard(r)); });
    });
}

// 検索：タイトル＋#タグ＋塗料名（grid内自由入力 c）で公開投稿を絞り込み
function openSearchResults(q){
  q = String(q || "").trim();
  if (!q || !sb) return;
  if (!fullview.hidden){ fullview.hidden = true; fullviewBody.innerHTML = ""; }
  $("screen-discover").hidden = true; $("screen-records").hidden = true; $("screen-tag").hidden = false;
  setHash("q/" + encodeURIComponent(q));
  $("tagTitle").textContent = "検索：" + q;
  var list = $("tagList"); list.innerHTML = '<p class="pf-empty">読み込み中…</p>';
  var recoSec = $("tagRecoSec"); recoSec.hidden = true;
  window.scrollTo(0,0);
  var qLow = q.toLowerCase();

  // 結果描画（RPC/フォールバック共通）。各行に r._why（理由ラベル）を持たせておく。
  function renderHits(hits){
    if (typeof track === "function") track("search", { q: q, hit_count: hits.length });
    if (!hits.length){ list.innerHTML = '<p class="pf-empty">「'+esc(q)+'」に一致する公開投稿はありません。</p>'; return; }
    list.innerHTML = "";
    hits.forEach(function(r){
      var c = recordCard(r);
      if (r._why){ var tip = document.createElement("span"); tip.className = "match-why"; tip.textContent = r._why; var th = c.querySelector(".pf-post-thumb"); if (th) th.appendChild(tip); }
      list.appendChild(c);
    });
  }

  // フォールバック：公開投稿を新着300件取得→クライアント側でtitle/methods/grid内塗料名フィルタ。
  // （search_recipes RPC 未適用の環境でも動くよう残置）
  function searchFallback(){
    sb.from("recipes").select("id,title,cover_url,is_public,created_at,methods,grid,owner_id").eq("is_public", true)
      .order("created_at", { ascending:false }).limit(300)
      .then(function(res){
        if (res && res.error){ list.innerHTML = '<p class="pf-empty">読み込みに失敗しました。</p>'; return; }
        var rows = res.data || [], hits = [];
        rows.forEach(function(r){
          var why = null;
          if (r.title && r.title.toLowerCase().indexOf(qLow) >= 0) why = "タイトル一致";
          else if (Array.isArray(r.methods)){
            var hit = r.methods.some(function(s){
              var lab = (METHOD_LABEL[s] || s).toLowerCase();
              return s.toLowerCase() === qLow || s.toLowerCase().indexOf(qLow) >= 0 || lab.indexOf(qLow) >= 0;
            });
            if (hit) why = "#タグ一致";
          }
          if (!why && r.grid && Array.isArray(r.grid.rows)){
            var paintHit = r.grid.rows.some(function(row){
              if (!row || !row.cells) return false;
              return Object.keys(row.cells).some(function(k){
                var c = row.cells[k]; return c && typeof c.c === "string" && c.c.toLowerCase().indexOf(qLow) >= 0;
              });
            });
            if (paintHit) why = "塗料一致";
          }
          if (why){ r._why = why; hits.push(r); }
        });
        renderHits(hits);
      });
  }

  // まずサーバー検索（search_recipes RPC）。未適用/エラーなら300件フォールバックへ。
  if (sb.rpc){
    var WHY = { title:"タイトル一致", tag:"#タグ一致", paint:"塗料一致" };
    sb.rpc("search_recipes", { _q: q, _limit: 50 }).then(function(res){
      if (!res || res.error || !Array.isArray(res.data)){ searchFallback(); return; }
      renderHits(res.data.map(function(r){ r._why = WHY[r.match_reason] || null; return r; }));
    }, searchFallback);
  } else { searchFallback(); }
}
function doSearchFrom(inp){
  var v = inp && inp.value ? inp.value.trim() : "";
  if (v) openSearchResults(v);
}

// 相対時刻（「3分前」「昨日」など）
function relTime(iso){
  if (!iso) return "";
  var d = new Date(iso), now = new Date(), sec = Math.floor((now-d)/1000);
  if (sec < 60) return "たった今";
  if (sec < 3600) return Math.floor(sec/60)+"分前";
  if (sec < 86400) return Math.floor(sec/3600)+"時間前";
  if (sec < 86400*2) return "昨日";
  if (sec < 86400*7) return Math.floor(sec/86400)+"日前";
  return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate();
}

// 30分非活動でリセットする session_id。匿名でも同一訪問を1セッションに束ねる
function getSessionId(){
  try {
    var key = "_pl_sess", now = Date.now();
    var raw = localStorage.getItem(key);
    var s = raw ? JSON.parse(raw) : null;
    if (s && s.id && (now - (s.t||0)) < 30*60*1000){
      s.t = now; localStorage.setItem(key, JSON.stringify(s)); return s.id;
    }
    var id = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (now + "-" + Math.random().toString(36).slice(2,10));
    localStorage.setItem(key, JSON.stringify({ id:id, t:now })); return id;
  } catch(_){ return null; }
}
// fire-and-forget。失敗してもアプリは止まらない（必ずtryで囲む）
function track(event_name, properties){
  if (!sb || !event_name) return;
  try {
    var row = { event_name: event_name, user_id: currentUserId || null, session_id: getSessionId(), properties: properties || {} };
    var p = sb.from("events").insert(row);
    if (p && p.then) p.then(function(){}, function(){});
  } catch(_){}
}

function doRegister(){
  // v2: 新規登録ではメール+PWのみ受け取り、ユーザーID/ニックネームはメール認証後の初回設定モーダル(showOnboarding)で決める。
  var email=$("aEmail").value.trim(), pw=$("aPw").value, pw2=$("aPw2").value,
      agree=$("aAgree").checked, err=$("aErr"), btn=$("aSubmit");
  if (!EMAIL_RE.test(email)){ err.textContent="メールアドレスの形式が正しくありません"; return; }
  if (pw.length < 6){ err.textContent="パスワードは6文字以上にしてください"; return; }
  if (pw !== pw2){ err.textContent="パスワードが一致しません"; return; }
  if (!agree){ err.textContent="利用規約・プライバシーポリシーへの同意が必要です"; return; }
  btn.disabled=true; err.textContent="登録中…";
  sb.auth.signUp({ email:email, password:pw, options:{ emailRedirectTo: location.origin+location.pathname } }).then(function(r){
    if (r.error){ err.textContent="登録に失敗：" + r.error.message; btn.disabled=false; return; }
    // 同意時刻と has_password だけ立てておく（user_id/display_nameはonboardingで本人が決める）
    if (r.data && r.data.session){
      currentUserId = r.data.user.id;   // 即ログイン（確認メールOFF時）→ onboardingが自動で出る
      saveProfile({ terms_agreed_at: new Date().toISOString(), has_password: true }, function(){ closeAuth(); });

    }
  });

var USERID_RE = /^[A-Za-z0-9_]{3,20}$/;
function showOnboarding(){
  var ov = $("onbOverlay"), uid = $("onbUserId"), inp = $("onbName"), agree = $("onbAgree"), btn = $("onbSave"), err = $("onbErr");
  ov.hidden = false; uid.value = ""; inp.value = ""; agree.checked = false; err.textContent = "";
  function upd(){ btn.disabled = !(USERID_RE.test(uid.value.trim()) && inp.value.trim() && agree.checked); }
  uid.oninput = upd; inp.oninput = upd; agree.onchange = upd; upd();
  setTimeout(function(){ uid.focus(); }, 60);
  btn.onclick = function(){
    var id = uid.value.trim(), nm = inp.value.trim();
    if (!USERID_RE.test(id)){ err.textContent = "ユーザーIDは半角英数と _ の3〜20文字"; return; }
    if (!nm || !agree.checked) return;
    btn.disabled = true; err.textContent = "確認中…";
    // ユーザーID重複チェック（大小無視）。ilikeの _ % \ はワイルドカードなのでエスケープして完全一致にする
    sb.from("profiles").select("id").ilike("user_id", id.replace(/([\\%_])/g, "\\$1")).then(function(res){
      if (res.data && res.data.length){ err.textContent = "このユーザーIDは既に使われています"; btn.disabled = false; return; }
      // user_id（不変）＋ニックネーム＋規約同意時刻を保存。本名は使わない
      saveProfile({ user_id: id, display_name: nm, terms_agreed_at: new Date().toISOString() }, function(r){
        if (r && r.error){ err.textContent = "保存に失敗しました（IDが重複の可能性）"; btn.disabled = false; return; }
        err.textContent = ""; ov.hidden = true;
      });
    });
  };
}

    .then(function(res){ sb.auth.getSession().then(function(r){ applySession(r.data.session); if (cb) cb(res); }); });

// 画像をcanvasで縮小＆JPEG圧縮（容量・転送量の節約＝課金暴走防止）
function compressImage(file, maxEdge, quality){
  return new Promise(function(resolve, reject){
    var img = new Image();
    img.onload = function(){
      var s = Math.min(1, maxEdge / Math.max(img.width, img.height));
      var cw = Math.round(img.width * s), ch = Math.round(img.height * s);
      var c = document.createElement("canvas"); c.width = cw; c.height = ch;
      c.getContext("2d").drawImage(img, 0, 0, cw, ch);
      c.toBlob(function(b){ b ? resolve(b) : reject(new Error("変換失敗")); }, "image/jpeg", quality);
    };
    img.onerror = function(){ reject(new Error("画像を読み込めません")); };
    img.src = URL.createObjectURL(file);
  });
}

// ヘッダー/アイコン画像をStorageにアップロード→profilesに保存
// 加工済みblob（cropper出力）をStorage→profilesへ。再圧縮不要。
function uploadProfileBlob(kind, blob, statusEl, prevEl){
  if (!sb || !currentUserId || !blob) return;
  if (statusEl) statusEl.textContent = "アップロード中…";
  var path = currentUserId + "/" + kind + "_" + Date.now() + ".jpg";
  sb.storage.from("profile").upload(path, blob, { contentType:"image/jpeg", upsert:true }).then(function(up){
    if (up.error) throw up.error;
    var url = sb.storage.from("profile").getPublicUrl(up.data.path).data.publicUrl;
    var field = (kind === "avatar") ? { avatar_url:url } : { header_url:url };
    return sb.from("profiles").update(field).eq("id", currentUserId).then(function(r){
      if (r.error) throw r.error;
      if (prevEl) prevEl.style.backgroundImage = "url(" + url + ")";
      if (statusEl) statusEl.textContent = "更新しました ✓";
    });
  }).catch(function(e){ if (statusEl) statusEl.textContent = "失敗: " + (e.message || e); });
}
// 互換: Fileを圧縮してそのまま上げる（cropperを通さない経路用・現状未使用だが残置）
function uploadProfileImage(kind, file, statusEl, prevEl){
  if (!sb || !currentUserId) return;
  if (statusEl) statusEl.textContent = "アップロード中…";
  compressImage(file, (kind === "avatar") ? 512 : 1500, 0.85)
    .then(function(blob){ uploadProfileBlob(kind, blob, statusEl, prevEl); })
    .catch(function(e){ if (statusEl) statusEl.textContent = "失敗: " + (e.message || e); });
}
// X風の画像トリミング：ドラッグで移動＋スライダー/ホイールで拡大→見えている範囲を切り出して onDone(blob)
function openImageCropper(file, opts, onDone){
  opts = opts || {};
  var aspect = opts.aspect || 1, outW = opts.outW || 512, outH = opts.outH || Math.round(outW / aspect);
  var img = new Image();
  img.onerror = function(){ alert("この画像は読み込めませんでした"); };
  img.onload = function(){
    var iw = img.naturalWidth, ih = img.naturalHeight;
    var fw = Math.min(window.innerWidth - 40, 340), fh = Math.round(fw / aspect);
    var maxH = window.innerHeight - 220;
    if (fh > maxH){ fh = Math.max(80, maxH); fw = Math.round(fh * aspect); }
    var coverScale = Math.max(fw / iw, fh / ih);
    var scale = coverScale, offsetX = (fw - iw * scale) / 2, offsetY = (fh - ih * scale) / 2;

    var ov = document.createElement("div"); ov.className = "crop-ov";
    ov.innerHTML =
      '<div class="crop-title">' + esc(opts.title || "位置を調整") + '</div>'
      + '<div class="crop-stage' + (opts.round ? " round" : "") + '" style="width:' + fw + 'px;height:' + fh + 'px"></div>'
      + '<div class="crop-hint">ドラッグで移動 / スライダーで拡大</div>'
      + '<input type="range" class="crop-zoom" min="1" max="3" step="0.01" value="1">'
      + '<div class="crop-row"><button class="crop-btn crop-cancel">キャンセル</button><button class="crop-btn crop-ok">決定</button></div>';
    document.body.appendChild(ov);
    var stage = ov.querySelector(".crop-stage");
    img.className = "crop-img"; stage.appendChild(img);

    function apply(){
      offsetX = Math.min(0, Math.max(fw - iw * scale, offsetX));
      offsetY = Math.min(0, Math.max(fh - ih * scale, offsetY));
      img.style.width = (iw * scale) + "px"; img.style.height = (ih * scale) + "px";
      img.style.left = offsetX + "px"; img.style.top = offsetY + "px";
    }
    function setScale(ns){
      ns = Math.max(coverScale, ns);
      var cx = fw / 2, cy = fh / 2, ix = (cx - offsetX) / scale, iy = (cy - offsetY) / scale;
      scale = ns; offsetX = cx - ix * scale; offsetY = cy - iy * scale; apply();
    }
    apply();

    var zoom = ov.querySelector(".crop-zoom");
    zoom.addEventListener("input", function(){ setScale(coverScale * parseFloat(zoom.value)); });
    stage.addEventListener("wheel", function(e){ e.preventDefault(); var nv = Math.min(3, Math.max(1, (scale / coverScale) * (e.deltaY < 0 ? 1.06 : 0.94))); zoom.value = nv; setScale(coverScale * nv); }, { passive:false });

    var dragging = false, sx0 = 0, sy0 = 0, ox0 = 0, oy0 = 0;
    stage.addEventListener("pointerdown", function(e){ dragging = true; sx0 = e.clientX; sy0 = e.clientY; ox0 = offsetX; oy0 = offsetY; stage.setPointerCapture(e.pointerId); stage.classList.add("grabbing"); });
    stage.addEventListener("pointermove", function(e){ if (!dragging) return; offsetX = ox0 + (e.clientX - sx0); offsetY = oy0 + (e.clientY - sy0); apply(); });
    function endDrag(){ dragging = false; stage.classList.remove("grabbing"); }
    stage.addEventListener("pointerup", endDrag); stage.addEventListener("pointercancel", endDrag);

    function close(){ try { document.body.removeChild(ov); } catch (_) {} URL.revokeObjectURL(img.src); }
    ov.querySelector(".crop-cancel").onclick = close;
    ov.querySelector(".crop-ok").onclick = function(){
      var c = document.createElement("canvas"); c.width = outW; c.height = outH;
      c.getContext("2d").drawImage(img, -offsetX / scale, -offsetY / scale, fw / scale, fh / scale, 0, 0, outW, outH);
      c.toBlob(function(b){ close(); if (b && onDone) onDone(b); }, "image/jpeg", 0.85);
    };
  };
  img.src = URL.createObjectURL(file);
}

// 退会＝アカウント＋全データ完全削除（サーバの delete_user 関数を呼ぶ。cascadeで投稿等も消える）
function deleteAccount(){
  if (!sb || !currentUserId) return;
  if (!confirm("本当に退会しますか？\nアカウント・プロフィール・投稿など、あなたのデータはすべて完全に削除され、元に戻せません。")) return;
  if (!confirm("最終確認：すべてのデータを削除します。よろしいですか？")) return;
  var uid = currentUserId;
  // 画像はStorage API経由で先に削除（DBからの直接削除は禁止のため）→ その後アカウント削除
  sb.storage.from("profile").list(uid).then(function(res){
    var files = ((res && res.data) || []).map(function(f){ return uid + "/" + f.name; });
    return files.length ? sb.storage.from("profile").remove(files) : Promise.resolve();
  }).then(function(){
    return sb.rpc("delete_user");

    if (res && res.error) throw res.error;
    return sb.auth.signOut();

    // 認証を一切初期化しない静的ページへ（自動再ログインが起きない）
    location.href = "goodbye.html";

}

// Xアカウント(@ID or URL)を x.com のプロフィールURLに正規化。それ以外はnull（投稿ページと同じ判定）
function xProfileUrl(v){
  if (!v) return null;
  var a = String(v).trim();
  var m = a.match(/(?:twitter\.com|x\.com)\/@?([A-Za-z0-9_]{1,15})/i);
  if (m) return "https://x.com/" + m[1];
  a = a.replace(/^@/, "");
  if (/^[A-Za-z0-9_]{1,15}$/.test(a)) return "https://x.com/" + a;
  return null;
}

    setBellBadge(0);

}

// 運営：完全削除ボタンを作る（管理者のみ。confirm 1回→toast→card削除）
function makeDeleteBtn(table, id, card){
  var b = document.createElement("button");
  b.className = "rep-btn danger"; b.textContent = "削除";
  b.onclick = function(){
    if (!confirm("この" + (table === "reports" ? "通報" : "お問い合わせ") + "を完全に削除します。元に戻せません。")) return;
    b.disabled = true;
    sb.from(table).delete().eq("id", id).then(function(d){
      if (d.error){ b.disabled = false; alert("削除に失敗：" + d.error.message); return; }
      if (card && card.parentNode) card.parentNode.removeChild(card);
      toast("削除しました");
    });
  };
  return b;
}
// 運営：対応済みのトグル（誤操作時に未対応へ戻せる）。
// 削除しない限り一覧から消えない。reviewed はカードを淡色表示にして区別する。
function bindToggleDone(btn, table, id, initial, card){
  var current = (initial === "reviewed") ? "reviewed" : "open";
  function paint(){
    btn.textContent = current === "open" ? "対応済みにする" : "✓ 対応済み（取り消す）";
    btn.classList.toggle("on", current !== "open");
    if (card) card.classList.toggle("rep-done", current !== "open");
  }
  paint();
  btn.onclick = function(){
    btn.disabled = true;
    var next = current === "open" ? "reviewed" : "open";
    sb.from(table).update({ status: next }).eq("id", id).then(function(u){
      btn.disabled = false;
      if (u.error){ alert("更新に失敗：" + u.error.message); return; }
      current = next; paint();
      toast(next === "reviewed" ? "対応済みにしました" : "未対応に戻しました");
    });
  };
}

// 運営：アクセス分析ダッシュボード（is_admin のみ。RLSで一般は0件）
function openAnalyticsAdmin(){
  if (!sb) return;
  $("fvTitle").textContent = "アクセス分析（運営）";
  fullviewBody.innerHTML = '<div class="stub"><p>読み込み中…</p></div>';
  fullview.hidden = false; setHash("analytics");
  var since = new Date(Date.now() - 30*24*3600*1000).toISOString();   // 直近30日
  sb.from("events").select("occurred_at,event_name,properties").gte("occurred_at", since)
    .order("occurred_at", { ascending:false }).limit(5000)
    .then(function(res){
      if (res && res.error){ fullviewBody.innerHTML = '<div class="stub"><p>読み込みに失敗しました：'+esc(res.error.message)+'</p></div>'; return; }
      var rows = res.data || [];
      // 集計
      var pvByDay = {}, popularRecipes = {}, popularPaints = {}, searchWords = {}, clickBuy = {};
      var dayMs = 24*3600*1000, now = Date.now();
      rows.forEach(function(e){
        var p = e.properties || {};
        if (e.event_name === "page_view"){
          var ageDays = Math.floor((now - new Date(e.occurred_at).getTime()) / dayMs);
          if (ageDays < 7){
            var d = new Date(e.occurred_at); var key = d.getMonth()+1 + "/" + d.getDate();
            pvByDay[key] = (pvByDay[key]||0) + 1;
          }
        } else if (e.event_name === "view_recipe" && p.recipe_id){
          popularRecipes[p.recipe_id] = (popularRecipes[p.recipe_id]||0) + 1;
        } else if (e.event_name === "click_paint"){
          var k = p.paint_id || p.paint_name || "?"; popularPaints[k] = (popularPaints[k]||0) + 1;
        } else if (e.event_name === "search" && p.q){
          var q = String(p.q).toLowerCase(); searchWords[q] = (searchWords[q]||0) + 1;
        } else if (e.event_name === "click_buy"){
          var sk = (p.shop||"?") + " / " + (p.paint_name||"?"); clickBuy[sk] = (clickBuy[sk]||0) + 1;
        }
      });
      function topN(obj, n){
        return Object.keys(obj).map(function(k){ return [k, obj[k]]; })
          .sort(function(a,b){ return b[1]-a[1]; }).slice(0, n);
      }
      function table(title, rows, head){
        var html = '<h3 class="set-h">'+esc(title)+'</h3>';
        if (!rows.length){ html += '<p style="color:var(--sub);font-size:.88rem;margin:0 0 18px">記録なし</p>'; return html; }
        html += '<table style="width:100%;border-collapse:collapse;margin-bottom:24px;font-size:.86rem">';
        html += '<thead><tr><th style="text-align:left;padding:6px 8px;color:var(--sub);border-bottom:1px solid var(--line)">'+esc(head[0])+'</th><th style="text-align:right;padding:6px 8px;color:var(--sub);border-bottom:1px solid var(--line);width:80px">'+esc(head[1])+'</th></tr></thead><tbody>';
        rows.forEach(function(r){ html += '<tr><td style="padding:7px 8px;border-bottom:1px solid var(--line);word-break:break-all">'+esc(String(r[0]))+'</td><td style="padding:7px 8px;border-bottom:1px solid var(--line);text-align:right;font-weight:700">'+r[1]+'</td></tr>'; });
        html += '</tbody></table>'; return html;
      }
      // 直近7日PVを日付で並べ替え
      var pvList = Object.keys(pvByDay).map(function(k){ return [k, pvByDay[k]]; }).sort(function(a,b){
        var pa = a[0].split("/").map(Number), pb = b[0].split("/").map(Number);
        return (pa[0]-pb[0]) || (pa[1]-pb[1]);
      });
      var html = '<div style="padding:20px 16px"><h2 style="font-size:1.1rem;margin:0 0 4px">アクセス分析</h2>'
        + '<p style="font-size:.78rem;color:var(--sub);margin:0 0 20px">直近30日のイベント／集計：直近7日PV・人気投稿・人気塗料・人気検索・収益クリック</p>'
        + table("直近7日 ページビュー（日別）", pvList, ["日付","PV"])
        + table("人気の投稿 Top10（閲覧）", topN(popularRecipes, 10), ["recipe_id","回数"])
        + table("人気の塗料 Top10（タップ）", topN(popularPaints, 10), ["塗料","回数"])
        + table("人気の検索ワード Top20", topN(searchWords, 20), ["検索ワード","回数"])
        + table("収益クリック Top10（Buyボタン）", topN(clickBuy, 10), ["ショップ/塗料","回数"])
        + '<p style="font-size:.72rem;color:var(--sub);margin-top:14px">※ 詳細は Supabase ダッシュボードの events テーブルから直接見られます。</p>'
        + '</div>';
      fullviewBody.innerHTML = html;
    });
}

function trendingScore(r){
  var ageDays = (Date.now() - new Date(r.created_at).getTime()) / 86400000;
  return (r.view_count || 0) / (ageDays + 1.5);
}
function byTrending(a, b){
  var d = trendingScore(b) - trendingScore(a);
  return d !== 0 ? d : (new Date(b.created_at) - new Date(a.created_at));
}

function loadTileCovers(){
  if (!sb) return;
  sb.from("recipes").select("cover_url,methods,created_at,view_count").eq("is_public", true)
    .not("cover_url", "is", null).order("created_at", { ascending:false }).limit(120)
    .then(function(res){
      var rows = (res && !res.error && res.data) ? res.data : [];
      var best = {};   // slug -> 最高スコアの投稿
      rows.forEach(function(r){
        (r.methods || []).forEach(function(s){
          if (!best[s] || trendingScore(r) > trendingScore(best[s])) best[s] = r;
        });
      });
      var cover = {};
      Object.keys(best).forEach(function(s){ cover[s] = best[s].cover_url; });
      var tiles = document.querySelectorAll("#catGrid .cat-tile");
      for (var i=0;i<tiles.length;i++){

          var img = document.createElement("img"); img.src = cover[s]; img.alt = "";
          t.insertBefore(img, t.firstChild);
        }
      }

/* ----------------------------- カルーセル ----------------------------- */
function startCarousel(row, dots){
  var cards = Array.prototype.slice.call(row.children);
  if (cards.length === 0) return;
  var base = cards[0].offsetLeft;
  var index = 0, timer = null, idle = null;
  function setDots(i){
    var ds = dots.querySelectorAll(".dot");
    for (var k=0;k<ds.length;k++) ds[k].classList.toggle("on", k === i);
  }
  function go(i){
    index = (i + cards.length) % cards.length;
    row.scrollTo({ left: cards[index].offsetLeft - base, behavior:"smooth" });
    setDots(index);
  }
  function start(){ stop(); timer = setInterval(function(){ go(index+1); }, 2800); }
  function stop(){ if (timer) clearInterval(timer); timer = null; }
  row.addEventListener("scroll", function(){
    var step = cards[1] ? (cards[1].offsetLeft - base) : 1;
    var near = Math.round(row.scrollLeft / step);
    index = Math.max(0, Math.min(cards.length - 1, near));
    setDots(index);
    stop(); clearTimeout(idle); idle = setTimeout(start, 1600);
  }, { passive:true });
  start();
}

  if (!standalone) return;   // 通常ブラウザは標準のpull-to-refreshがあるので付けない

  // 自前のインジケーター＋スタイルを注入
  var st = document.createElement('style');
  st.textContent = '.ptr{position:fixed;top:0;left:50%;z-index:300;width:36px;height:36px;border-radius:50%;'
    + 'background:var(--card,#fff);box-shadow:0 3px 12px rgba(20,24,32,.18);display:flex;align-items:center;justify-content:center;'
    + 'transform:translate(-50%,-52px);opacity:0;pointer-events:none}'
    + '.ptr svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2.4}'
    + '.ptr.spin{transition:transform .2s,opacity .2s}.ptr.spin svg{animation:ptrRot .7s linear infinite}'
    + '@keyframes ptrRot{to{transform:rotate(360deg)}}';
  document.head.appendChild(st);
  var sp = document.createElement('div'); sp.className='ptr';
  sp.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36" stroke-linecap="round"/><path d="M21 4v5h-5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  document.body.appendChild(sp);

  var startY=0, pulling=false, dist=0, busy=false;
  var THRESH=70, MAX=120;

  function canPull(){
    if (busy) return false;
    if ((window.scrollY||document.documentElement.scrollTop||0) > 0) return false;   // 一番上にいる時だけ
    var fv = document.getElementById('fullview'); if (fv && !fv.hidden) return false;  // 通知/設定等の全画面中は無効
    var ao = document.getElementById('authOverlay'); if (ao && !ao.hidden) return false;
    if (document.querySelector('.scrim.show')) return false;                            // ドロワー開いてる時は無効
    return true;
  }
  function setPos(d, rot){ sp.style.transform = 'translate(-50%,'+ d +'px) rotate('+ rot +'deg)'; }
  function reset(){ sp.classList.remove('spin'); sp.style.opacity=0; setPos(-52,0); }

  window.addEventListener('touchstart', function(e){
    if (!canPull()){ pulling=false; return; }
    startY = e.touches[0].clientY; pulling=true; dist=0;
  }, { passive:true });

  window.addEventListener('touchmove', function(e){
    if (!pulling) return;
    dist = e.touches[0].clientY - startY;
    if (dist <= 0){ pulling=false; reset(); return; }
    if ((window.scrollY||0) <= 0){ e.preventDefault(); }   // ネイティブのバウンスを抑える
    var d = Math.min(dist, MAX);
    sp.classList.remove('spin');
    sp.style.opacity = Math.min(1, d/THRESH);
    setPos(-52 + d*0.62, d*2.4);   // 引くほど下りて回る
  }, { passive:false });

  window.addEventListener('touchend', function(){
    if (!pulling) return;
    pulling=false;
    if (dist > THRESH){
      busy=true;
      sp.classList.add('spin');
      sp.style.opacity=1; setPos(18,0);
      setTimeout(function(){ location.reload(); }, 180);   // くるっと見せてから更新
    } else {
      sp.classList.add('spin'); setPos(-52,0); sp.style.opacity=0;
      setTimeout(function(){ sp.classList.remove('spin'); }, 220);
    }
  }, { passive:true });
})();
</script>
</body>
</html>
