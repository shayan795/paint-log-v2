<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>塗装レシピ録 v2 — 接続テスト(診断用)</title>
<style>
  :root{
    --ink:#1c1c1e; --sub:#6b6b70; --line:#e3e3e0; --bg:#faf9f6;
    --accent:#d24b3e; --ok:#1e7a45; --ng:#c8161e; --card:#fff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    line-height:1.6; padding:24px; max-width:560px; margin:0 auto;
  }
  header{padding:28px 0 18px; border-bottom:2px solid var(--ink); margin-bottom:22px}
  h1{font-size:1.4rem; margin:0; letter-spacing:.06em; display:flex; align-items:center; gap:10px}
  h1::before{content:""; width:14px; height:14px; background:var(--accent); border-radius:50%}
  .tag{font-size:.7rem; color:var(--sub); letter-spacing:.2em; margin-top:6px; text-transform:uppercase}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin:14px 0}
  .status{font-size:1.05rem; font-weight:700; display:flex; align-items:center; gap:10px}
  .dot{width:12px; height:12px; border-radius:50%; background:var(--sub); flex:none}
  .dot.ok{background:var(--ok)} .dot.ng{background:var(--ng)}
  .detail{font-size:.85rem; color:var(--sub); margin-top:8px; white-space:pre-wrap; word-break:break-word}
  .muted{font-size:.82rem; color:var(--sub)}
  code{background:#f0efeb; padding:1px 5px; border-radius:4px; font-size:.82em}
  ol{padding-left:1.25em} li{margin:4px 0}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>塗装レシピ録 v2</h1>
  <div class="tag">connection test (diagnostics)</div>
</header>

<div class="card">
  <div id="cfg" class="status"><span class="dot"></span>設定を確認中…</div>
  <div id="cfgDetail" class="detail"></div>
</div>

<div class="card">
  <div id="db" class="status"><span class="dot"></span>データベース接続を確認中…</div>
  <div id="dbDetail" class="detail"></div>
</div>

<div class="card">
  <div class="muted">この画面はSupabase接続の診断用。アプリ本体は <a href="index.html">index.html</a>。</div>
</div>

<script src="src/config.js"></script>
<script type="module">
  const cfgEl = document.getElementById("cfg");
  const cfgDetail = document.getElementById("cfgDetail");
  const dbEl = document.getElementById("db");
  const dbDetail = document.getElementById("dbDetail");
  const set = (el, state, text) => {
    el.querySelector(".dot").className = "dot " + state;
    el.childNodes[1].nodeValue = text;
  };

  const cfg = window.PAINTLOG_CONFIG || {};
  if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
    set(cfgEl, "ng", "設定が未入力");
    cfgDetail.textContent = "src/config.js に SUPABASE_URL と SUPABASE_ANON_KEY を貼ってください。";
    set(dbEl, "ng", "設定待ちのため未確認");
  } else {
    set(cfgEl, "ok", "設定OK");
    cfgDetail.textContent = cfg.SUPABASE_URL;
    try {
      const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
      const sb = createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
      const { data, error, count } = await sb
        .from("paints").select("*", { count: "exact", head: false }).limit(1);
      if (error) {
        set(dbEl, "ng", "接続NG");
        dbDetail.textContent = error.message + "\n(schema.sql / seed_paints.sql は実行済みですか?)";
      } else {
        set(dbEl, "ok", "接続OK");
        dbDetail.textContent = `paints テーブルを読めました(登録 ${count ?? "?"} 色)。`;
      }
    } catch (e) {
      set(dbEl, "ng", "接続NG");
      dbDetail.textContent = String(e && e.message || e);
    }
  }
</script>
</body>
</html>
